      total_bottles: mockWines.length,
      total_capacity: 270,
      available_slots: 270 - mockWines.length,
      total_value: mockWines.reduce((sum, w) => sum + (w.retail_price || w.price || 0), 0),
      total_cost: mockWines.reduce((sum, w) => sum + (w.price || 0), 0),
      by_type: { red: 7, white: 3, "rosé": 1, sparkling: 1, dessert: 2 },
      by_cabinet: { "cabinet-1": 8, "cabinet-2": 5, "cabinet-3": 2 },
    };

    // Mock hass object
    const mockHass = {
      callWS: async (msg) => {
        switch (msg.type) {
          case "wine_cellar/get_wines":
            return { wines: mockWines };
          case "wine_cellar/get_cabinets":
            return { cabinets: mockCabinets };
          case "wine_cellar/get_stats":
            return mockStats;
          case "wine_cellar/get_capabilities":
            return { has_gemini: true };
          case "wine_cellar/lookup_barcode":
            return { result: { name: "Test Wine", winery: "Test Winery", region: "Test Region", country: "France", vintage: 2020, type: "red", grape_variety: "Merlot", rating: 4.0, ratings_count: 500, image_url: "https://images.vivino.com/thumbs/ApnxEJsiSaCuFadP5WMFKQ_375x500.jpg", price: 30, description: "A rich, full-bodied red.", food_pairings: "Beef, Pasta", alcohol: "13.5%", source: "mock" }, cached: false };
          case "wine_cellar/search_wine":
            return { results: [{ name: "Search Result Wine", winery: "Found Winery", region: "Found Region", country: "Italy", vintage: 2021, type: "red", grape_variety: "Sangiovese", rating: 3.8, ratings_count: 1200, image_url: "https://images.vivino.com/thumbs/I64BJ-p-T2awMGz0X-nGwQ_375x500.jpg", price: 25, description: "Fresh and fruity with cherry notes.", food_pairings: "Pasta, Pizza, Poultry", alcohol: "13.0%", source: "mock" }] };
          case "wine_cellar/add_wine":
            mockWines.push({ ...msg.wine, id: "new-" + Date.now(), added_at: new Date().toISOString() });
            return { wine: mockWines[mockWines.length - 1] };
          case "wine_cellar/remove_wine":
            const idx = mockWines.findIndex(w => w.id === msg.wine_id);
            if (idx >= 0) mockWines.splice(idx, 1);
            return { success: true };
          case "wine_cellar/update_wine":
            const wine = mockWines.find(w => w.id === msg.wine_id);
            if (wine && msg.updates) Object.assign(wine, msg.updates);
            return { wine };
          case "wine_cellar/analyze_wines":
            return { updated: mockWines.length, total: mockWines.length };
          case "wine_cellar/refresh_wine":
            const rw = mockWines.find(w => w.id === msg.wine_id);
            if (rw) {
              rw.description = rw.description || "Rich and complex with great depth.";
              rw.food_pairings = rw.food_pairings || "Beef, Lamb, Pasta";
              rw.alcohol = rw.alcohol || "14.0%";
              rw.ratings_count = rw.ratings_count || 2500;
            }
            return { wine: rw, updated_fields: ["description", "food_pairings", "alcohol", "ratings_count"] };
          case "wine_cellar/analyze_single_wine":
            const aw = mockWines.find(w => w.id === msg.wine_id);
            if (aw) {
              aw.disposition = aw.disposition || "D";
              aw.drink_by = aw.drink_by || "2030";
              aw.drink_window = "2025-2035";
              aw.ai_ratings = { rating_ws: 94, rating_rp: 96, rating_jd: 95, rating_ag: 93 };
              aw.description = aw.description || "Complex and elegant with refined tannins.";
            }
            return { wine: aw, analysis: {} };
          case "wine_cellar/get_capabilities":
            return { has_gemini: true };
          default:
            return {};
        }
      },
