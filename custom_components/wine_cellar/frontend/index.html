                { name: "Sancerre Les Baronnes 2022", winery: "Henri Bourgeois", region: "Loire Valley", country: "France", vintage: 2022, type: "white", grape_variety: "Sauvignon Blanc", price: 32 },
                { name: "Barolo Monfortino 2016", winery: "Giacomo Conterno", region: "Piedmont", country: "Italy", vintage: 2016, type: "red", grape_variety: "Nebbiolo", price: 450 },
              ],
            };
          case "wine_cellar/server_backup_save":
            return { success: true, filename: "wine_cellar_" + new Date().toISOString().replace(/[:.]/g, "").slice(0, 15) + ".json", wines: mockWines.length, cabinets: mockCabinets.length, buy_list: mockBuyList.length, timestamp: new Date().toISOString() };
          case "wine_cellar/server_backup_list":
            return { backups: [
              { filename: "wine_cellar_20260307_150000.json", timestamp: "2026-03-07T15:00:00Z", wines: 19, cabinets: 3, buy_list: 4, size: 12500 },
              { filename: "wine_cellar_20260306_120000.json", timestamp: "2026-03-06T12:00:00Z", wines: 17, cabinets: 3, buy_list: 3, size: 11200 },
              { filename: "wine_cellar_20260305_090000.json", timestamp: "2026-03-05T09:00:00Z", wines: 15, cabinets: 3, buy_list: 2, size: 9800 },
            ]};
          case "wine_cellar/server_backup_restore":
            return { success: true, filename: msg.filename, wines: mockWines.length, cabinets: mockCabinets.length, buy_list: mockBuyList.length, timestamp: new Date().toISOString() };
          case "wine_cellar/backup_data":
            return { wines: mockWines, cabinets: mockCabinets, buy_list: mockBuyList };
          case "wine_cellar/vivino_enrich":
            return { rating: 4.2, ratings_count: 3500, price: msg.price || 50, image_url: "https://images.vivino.com/thumbs/ApnxEJsiSaCuFadP5WMFKQ_375x500.jpg" };
          case "wine_cellar/ai_enrich_wine":
            return { description: "A complex and elegant wine with great structure.", disposition: "H", drink_window: "2025-2035", estimated_price: 75, ai_ratings: { rating_ws: 93, rating_rp: 94, rating_jd: 92, rating_ag: 91 } };
          default:
            return {};
        }
      },
      callService: async () => {},
    };

    // Wait for card to load then inject hass
    window.addEventListener("DOMContentLoaded", () => {
      const card = document.querySelector("wine-cellar-card");
      if (card) {
        card.setConfig({ type: "custom:wine-cellar-card", title: "Wine Cellar" });
        card.hass = mockHass;
      }
    });
  </script>
  <script type="module" src="./wine-cellar-card.js"></script>
